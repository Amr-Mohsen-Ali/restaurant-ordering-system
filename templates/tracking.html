{% extends "base.html" %}

{% block title %}Order Tracking{% endblock %}

{% block content %}
<div class="tracking-page">
    <div class="tracking-panel">
        <h1>Order Tracking</h1>
        <p>Enter your order ID to see the latest delivery status.</p>

        <form id="trackingForm" class="tracking-form">
            <label for="orderId">Order ID</label>
            <div class="input-row">
                <input id="orderId" name="orderId" type="text" autocomplete="off" placeholder="Example: 1000">
                <button id="trackButton" type="submit" class="btn">Track</button>
            </div>
        </form>

        <div id="result" role="status" aria-live="polite">Waiting for an order ID.</div>

        <div class="status-progress" aria-label="Order progress" id="statusProgress" style="display: none;">
            <div class="status-step" data-status-step="Preparing">
                <span class="status-dot"></span>
                <span>Preparing</span>
            </div>
            <div class="status-step" data-status-step="Out for Delivery">
                <span class="status-dot"></span>
                <span>Out for Delivery</span>
            </div>
            <div class="status-step" data-status-step="Delivered">
                <span class="status-dot"></span>
                <span>Delivered</span>
            </div>
        </div>

        <div id="orderDetails" class="order-details" hidden></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/tracking.js') }}"></script>
{% endblock %}
