{% extends "base.html" %}

{% block title %}Order Tracking{% endblock %}

{% block content %}
<main class="tracking-page">
    <section class="tracking-panel" aria-labelledby="tracking-title">
        <h1 id="tracking-title">Order Tracking</h1>
        <p>Enter your order ID to see the latest delivery status.</p>

        <form id="trackingForm">
            <label for="orderId">Order ID</label>
            <div class="input-row">
                <input id="orderId" name="orderId" type="text" autocomplete="off" placeholder="Example: 123">
                <button id="trackButton" type="submit">Track</button>
            </div>
        </form>

        <div id="result" role="status" aria-live="polite">Waiting for an order ID.</div>
    </section>
</main>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/tracking.js') }}"></script>
{% endblock %}
