{% extends "base.html" %}

{% block title %}Cart{% endblock %}

{% block content %}
<div class="cart-section">
    <h2>Your Cart 🛒 <span data-testid="cart-badge">0</span> items</h2>
    
    <p data-testid="cart-error-message" style="color:red; display:none; font-weight:bold;"></p>
    <p data-testid="cart-empty-message">Your cart is empty</p>

    <div id="cart-items" data-testid="cart-items-container" style="display:none;">
        </div>

    <hr>
    <h3>Total: <span data-testid="cart-total">0.00</span></h3>
    <a href="/checkout" class="btn">Proceed to Checkout</a>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/cart.js') }}"></script>
{% endblock %}
