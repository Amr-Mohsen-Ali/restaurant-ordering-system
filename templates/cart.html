{% extends "base.html" %}

{% block title %}Cart{% endblock %}

{% block content %}
<div class="container">
    <div class="cart-section">
        <h2>Your Cart</h2>

        <div id="cart-message" class="cart-message" role="status" aria-live="polite" hidden></div>

        <div class="cart-items" id="cartItemsContainer">
            <p class="empty-cart" id="emptyCartMessage">Your cart is empty</p>
        </div>

        <div class="cart-total">
            <h3>Total: EGP <span id="cartTotal">0.00</span></h3>
            <a href="/checkout" class="btn" id="checkoutBtn" style="display: none;">Proceed to Checkout</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/cart.js') }}"></script>
<script>
document.addEventListener('DOMContentLoaded', async function() {
    const resp = await fetch('/cart/data');
    const cart = await resp.json();

    const badge = document.getElementById('cartBadge');
    const totalEl = document.getElementById('cartTotal');
    const emptyMsg = document.getElementById('emptyCartMessage');
    const itemsContainer = document.getElementById('cartItemsContainer');
    const checkoutBtn = document.getElementById('checkoutBtn');

    if (cart.items && cart.items.length > 0) {
        badge.innerText = cart.items.reduce((sum, item) => sum + item.quantity, 0);
        totalEl.innerText = cart.total.toFixed(2);
        emptyMsg.style.display = 'none';
        checkoutBtn.style.display = 'inline-block';

        cart.items.forEach((item) => {
            const div = document.createElement('div');
            div.className = 'cart-item';
            div.innerHTML = `
                <div class="cart-item-info">
                    <h4>${item.name || item.item_id}</h4>
                    <p>EGP ${item.price.toFixed(2)} x ${item.quantity}</p>
                </div>
                <div class="cart-item-actions">
                    <button onclick="updateQuantity('${item.item_id}', 'decrease')" aria-label="Decrease quantity">-</button>
                    <span>${item.quantity}</span>
                    <button onclick="updateQuantity('${item.item_id}', 'increase')" aria-label="Increase quantity">+</button>
                    <button onclick="updateQuantity('${item.item_id}', 'remove')" aria-label="Remove item" style="color: red;">X</button>
                </div>
            `;
            itemsContainer.appendChild(div);
        });
    }
});

async function updateQuantity(itemId, action) {
    try {
        const response = await fetch('/cart/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ item_id: itemId, action: action })
        });
        const data = await response.json();
        if (data.success) {
            location.reload();
        }
    } catch (error) {
        console.error('Update failed:', error);
    }
}
</script>
{% endblock %}
